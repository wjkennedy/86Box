[Machine]
machine = mvi486
cpu_family = i486dx4
cpu_speed = 33333333
cpu_multi = 3
mem_size = 32768

[Video]
# Temporary stand-in until Canon Wingine is implemented
gfxcard = px_trio64_vlb

[Input devices]
keyboard_type = ps2
mouse_type = ps2

[Sound]
# Canon Object.station sound aligns with WSS base 0x530
sndcard = wss

[Network]
# Built-in AMD PCnet-32 (VLB)
net_01_card = pcnetvlb
net_01_base = 0x300
net_01_irq = 15

[Storage controllers]
# BusLogic BT-445C (VLB) per Canon certification notes
scsicard_1 = bt445c
scsicard_1_base = 0x334
scsicard_1_irq = 11
# VLB BusLogic doesn’t use ISA DMA; leave default

[Hard disks]
hdd_01_parameters = 63, 64, 1024, 0, scsi
hdd_01_scsi_location = 0:00

[Floppy and CD-ROM drives]
cdrom_01_parameters = 1, scsi
cdrom_01_scsi_location = 0:05

