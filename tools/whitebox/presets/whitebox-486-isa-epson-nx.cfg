[Machine]
machine = epson_nx
cpu_family = i486dx2
cpu_speed = 33333333
cpu_multi = 2
mem_size = 32768

[Video]
# On-board Wingine device is used by the machine entry

[Input devices]
keyboard_type = ps2
mouse_type = ps2

[Sound]
# No onboard sound; leave unset or add ISA card as needed

[Network]
# Optional ISA NIC; add one if needed (e.g., wd8013)

[Storage controllers]
# Built-in dual IDE per NX specs; no SCSI by default

[Hard disks]
hdd_01_parameters = 63, 64, 1024, 0, ide

[Floppy and CD-ROM drives]
cdrom_01_parameters = 1, ide

